<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waxxed on Waxx | Club Entry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-wrapper">
        
        <div class="login-logo-container">
            <img src="images/Waxx_NoBG.png" alt="Waxxed on Waxx Logo" class="login-logo-clean">
        </div>

        <div class="login-container">
            <h2>Lounge Access</h2>
            
            <form action="#" method="POST" onsubmit="alert('Processing log details...'); return false;">
                
                <div class="form-group">
                    <label>Membership Status</label>
                    <div class="form-group-inline">
                        <label class="inline-label">
                            <input type="radio" name="guest-status" value="visitor" checked> First-Time Visitor
                        </label>
                        <label class="inline-label">
                            <input type="radio" name="guest-status" value="returning"> Returning Guest
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="member-email">Email Address or Username</label>
                    <input type="email" id="member-email" name="member-email" placeholder="collector@waxxed.com" required>
                </div>

                <div class="form-group">
                    <label for="member-password">Passkey</label>
                    <input type="password" id="member-password" name="member-password" placeholder="••••••••" required>
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label class="inline-label">
                        <input type="checkbox" id="remember-user" name="remember-user"> Remember my username on this device
                    </label>
                </div>

                <button type="submit" class="btn">Enter Lounge</button>
            </form>

            <div class="login-utilities">
                <a href="alerts.html">Request Key (Join Club)</a>
                <a href="index.html">← Back to Street</a>
            </div>
        </div>

    </div>

</body>
</html>
