<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waxxed on Waxx | Club Entry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="login-wrapper">
        
        <div class="login-logo-container">
            <img src="images/Waxx_NoBG.png" alt="Waxxed on Waxx Logo" class="login-logo">
        </div>

        <div class="login-container">
            <h2>Lounge Access</h2>
            
            <form action="#" method="POST" onsubmit="alert('Authenticating membership credentials...'); return false;">
                <div class="form-group">
                    <label for="member-email">Email Address</label>
                    <input type="email" id="member-email" name="member-email" placeholder="collector@waxxed.com" required>
                </div>

                <div class="form-group">
                    <label for="member-password">Passkey</label>
                    <input type="password" id="member-password" name="member-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn">Enter Lounge</button>
            </form>

            <div class="login-utilities">
                <a href="alerts.html">Request Key (Join Club)</a>
                <a href="index.html">← Back to Street</a>
            </div>
        </div>

    </div>

</body>
</html>
