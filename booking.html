<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waxxed on Waxx | Artist Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="nav-brand">
            <img src="images/Waxx_NoBG.png" alt="Waxxed on Waxx Logo" class="logo">
            <h1>Waxxed on Waxx</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="merchandise.html">Merchandise</a></li>
                <li><a href="booking.html" class="active">Artist Booking</a></li>
                <li><a href="alerts.html">Join Club</a></li>
            </ul>
        </nav>
    </header>

    <main style="max-width: 750px;">
        <h2>Lounge Performance Auditions</h2>
        <div class="form-container">
            <form action="#" method="POST" enctype="multipart/form-data" onsubmit="alert('Submission received.'); return false;">
                <div class="form-group">
                    <label for="artist">Artist Name *</label>
                    <input type="text" id="artist" required>
                </div>
                <div class="form-group">
                    <label for="genre">Sound Style *</label>
                    <input type="text" id="genre" required>
                </div>
                <div class="form-group">
                    <label for="video-reel">Upload Performance Video *</label>
                    <input type="file" id="video-reel" accept="video/*" style="background: none; border: none; padding: 0;" required>
                </div>
                <button type="submit" class="btn">Submit Booking Application</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 WAXXED ON WAXX VINYL LOUNGE. ALL RIGHTS RESERVED.</p>
    </footer>

</body>
</html>
